<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate searching Database - Divisional Secreatariat Weligama</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 400px; margin: auto; }
        label { display: block; margin-top: 10px; }
        input { width: 100%; padding: 8px; margin-top: 5px; }
        button { margin-top: 20px; padding: 10px; width: 100%; }
    </style>
</head>
<body>
    <h1>Certificate searching Database - Divisional Secreatariat Weligama</h1>
    <form>
        <label for="division">Division:</label>
        <input type="text" id="division" name="division" required>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required>

        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname" required>

        <label for="mothername">Mother's Name:</label>
        <input type="text" id="mothername" name="mothername" required>

        <label for="certno">Birth Certificate No:</label>
        <input type="text" id="certno" name="certno" required>

        <label for="bookno">Book No:</label>
        <input type="text" id="bookno" name="bookno" required>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
